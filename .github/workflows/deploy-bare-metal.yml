name : Deploy to Hetzner Bare Metal

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-hetzner-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build_check:
    uses: ./.github/workflows/build-check.yml
    with:
      publish-artifact: true
    secrets: inherit

  build-and-push:
    name: Build and Push Docker Images
    needs: build_check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-musl

      - name: Make binary executable
        run: chmod +x target/x86_64-unknown-linux-musl/release/yral-daily-streaks

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for yral-daily-streaks-image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest

      - name: Build and push yral-daily-streaks-image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Hetzner Bare Metal
    needs: build-and-push
    runs-on: ubuntu-latest
    strategy:
      matrix:
        server:
          - name: naitik-1
            host: 94.130.14.115
          - name: naitik-2
            host: 138.201.194.117
      max-parallel: 1
    
    steps:
      - name: Import Secrets from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://vault.yral.com
          method: jwt
          role: yral-daily-streaks-role
          jwtGithubAudience: "https://github.com/dolr-ai"
          secrets: |
            secret/data/yral-daily-streaks/YRAL_AUTH_METADATA_SERVICE_ACCESS_PUBLIC_KEY value | JWT_PUBLIC_KEY ;
            secret/data/yral-daily-streaks/YRAL_AUTH_JWT_VERIFY_PUBLIC_KEY value | YRAL_AUTH_PUBLIC_KEY ;
            secret/data/yral-daily-streaks/PG_DATABASE_PASSWORD value | PG_DATABASE_PASSWORD ;
            secret/data/yral-daily-streaks/NAITIK_MACHINE_ACCESS_PRIVATE_KEY value | NAITIK_MACHINE_ACCESS_PRIVATE_KEY ;
            secret/data/yral-daily-streaks/PG_HOSTS value | PG_HOSTS ;
            secret/data/yral-daily-streaks/PG_PORT value | PG_PORT ;

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ env.NAITIK_MACHINE_ACCESS_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{matrix.server.host}} >> ~/.ssh/known_hosts

      - name: Check server connectivity
        run: |
          ssh -o ConnectTimeout=10 naitik@${{matrix.server.host}} "echo 'Server connection successful'"

      - name: Sync deployment files to server
        run: |
          rsync -avz --delete \
            ./deploy/ \
            naitik@${{matrix.server.host}}:yral-daily-streaks/

      - name: Log in to GitHub Container Registry on server
        run: |
          ssh naitik@${{matrix.server.host}} "
            echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          "

      - name: Deploy to ${{ matrix.server.name }} with docker compose
        env:
          SERVER_HOST: ${{ matrix.server.host }}
          SERVER_USER: naitik
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JWT_PUBLIC_KEY: ${{ env.JWT_PUBLIC_KEY }}
          YRAL_AUTH_PUBLIC_KEY: ${{ env.YRAL_AUTH_PUBLIC_KEY }}
          PG_DATABASE_PASSWORD: ${{ env.PG_DATABASE_PASSWORD }}
          PG_HOSTS: ${{ env.PG_HOSTS }}
          PG_PORT: ${{ env.PG_PORT }}
        run: |
          # Create deployment directory if not exists
          ssh $SERVER_USER@$SERVER_HOST "mkdir -p yral-daily-streaks"
          
          ssh $SERVER_USER@$SERVER_HOST "
            cd yral-daily-streaks
            
            echo 'Pulling latest images...'
            APP_IMAGE=ghcr.io/${{ github.repository }} \
            IMAGE_TAG=${{ github.sha }} \
            docker compose pull
            
            echo 'Stopping existing containers...'
            docker compose down --remove-orphans || true
            
            echo 'Starting services...'
            APP_IMAGE=ghcr.io/${{ github.repository }} \
            IMAGE_TAG=${{ github.sha }} \
            BIND_ADDRESS=0.0.0.0:3000 \
            JWT_PUBLIC_KEY='$JWT_PUBLIC_KEY' \
            YRAL_AUTH_PUBLIC_KEY='$YRAL_AUTH_PUBLIC_KEY' \
            PG_DATABASE_PASSWORD='$PG_DATABASE_PASSWORD' \
            PG_HOSTS='$PG_HOSTS' \
            PG_PORT='$PG_PORT' \
            docker compose up -d

            echo 'Waiting for services to start...'
            sleep 15
            echo 'Services status:'
            docker compose ps
          "
      
      - name: Verify deployment
        run: |
          ssh naitik@${{ matrix.server.host }} "
            cd yral-daily-streaks
            echo '=== Container Status ==='
            docker compose ps
            echo ''
            echo '=== Container Logs (last 20 lines) ==='
            docker compose logs --tail=20 yral-daily-streaks 2>/dev/null || echo 'Logs not yet available'
          "

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Target Server**: ${{ matrix.server.host }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment Method**: Docker Compose" >> $GITHUB_STEP_SUMMARY
          echo "- **Images**:" >> $GITHUB_STEP_SUMMARY
          echo "  - ghcr.io/${{ github.repository }}:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Services**: yral-daily-streaks" >> $GITHUB_STEP_SUMMARY
          echo "- **Secrets**: Injected via environment variables at runtime" >> $GITHUB_STEP_SUMMARY
      
      - name: Wait before next server
        run: |
          echo "Waiting 30 seconds before deploying to next server..."
          sleep 30
